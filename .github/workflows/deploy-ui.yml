name: Deploy Planning Poker UI to GitHub Pages

on:
  push:
    branches:
      - host_in_github_spike
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: planning-poker-ui/package-lock.json

      - name: Install dependencies
        working-directory: planning-poker-ui
        run: npm ci

      - name: Build UI
        working-directory: planning-poker-ui
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: planning-poker-ui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
